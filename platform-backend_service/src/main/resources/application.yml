spring:
  application:
    name: platform-backend-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:password}

app:
  security:
    auth-required: ${SECURITY_AUTH_ENABLED:true}
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-256-bit-secret-in-every-environment}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  execution-service:
    base-url: ${EXECUTION_SERVICE_URL:http://localhost:8001}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:admin}
    secret-key: ${MINIO_SECRET_KEY:password}
    challenges-bucket: ${MINIO_CHALLENGES_BUCKET:challenges}
  grading-queue: ${GRADING_QUEUE:grading-queue}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      database:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  bulkhead:
    instances:
      executionService:
        # Placeholder — needs sizing against the Execution Service's real concurrent
        # capacity (see docs/design/deferred-eager-final-architecture.md §6 item 6).
        max-concurrent-calls: 50
        max-wait-duration: 2s

logging:
  level:
    org.hibernate.SQL: INFO
