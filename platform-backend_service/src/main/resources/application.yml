spring:
  application:
    name: platform-backend-service
  mvc:
    async:
      request-timeout: 120000
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:password}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  security:
    auth-required: ${SECURITY_AUTH_ENABLED:true}
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-256-bit-secret-in-every-environment}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  aws:
    s3:
      challenges-bucket: ${AWS_S3_CHALLENGES_BUCKET:challenges-repo}
      gold-masters-bucket: ${AWS_S3_GOLD_MASTERS_BUCKET:gold-masters}
    ecs:
      cluster-arn: ${ECS_CLUSTER_ARN:}
      subnet-ids: ${ECS_SUBNET_IDS:}
      security-group-id: ${ECS_SECURITY_GROUP_ID:}
      execution-role-arn: ${ECS_EXECUTION_ROLE_ARN:}
      assign-public-ip: ${ECS_ASSIGN_PUBLIC_IP:DISABLED}
  fargate:
    session-ttl-seconds: ${FARGATE_SESSION_TTL:600}
    sandbox-server-port: ${SANDBOX_SERVER_PORT:8080}
  grading-queue: ${GRADING_QUEUE:grading-queue}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      database:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
      storage:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5

logging:
  level:
    org.hibernate.SQL: INFO
