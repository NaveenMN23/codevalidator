services:
  postgres:
    image: postgres:16-alpine
    container_name: interview_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-interview_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-interview_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interview_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: interview_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./platform-backend_service
    container_name: platform_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-interview_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      EXECUTION_SERVICE_URL: http://execution-service:8001
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_CHALLENGES_BUCKET: ${AWS_S3_CHALLENGES_BUCKET:-challenges-repo}
      AWS_S3_GOLD_MASTERS_BUCKET: ${AWS_S3_GOLD_MASTERS_BUCKET:-gold-masters}
      ECS_CLUSTER_ARN: ${ECS_CLUSTER_ARN:-}
      ECS_SUBNET_IDS: ${ECS_SUBNET_IDS:-}
      ECS_SECURITY_GROUP_ID: ${ECS_SECURITY_GROUP_ID:-}
      ECS_EXECUTION_ROLE_ARN: ${ECS_EXECUTION_ROLE_ARN:-}
      ECS_ASSIGN_PUBLIC_IP: ${ECS_ASSIGN_PUBLIC_IP:-DISABLED}
      REDIS_HOST: redis
      SECURITY_AUTH_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  codegen:
    build: ./platform-codegen
    container_name: platform_codegen
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_CHALLENGES_BUCKET=${AWS_S3_CHALLENGES_BUCKET:-challenges-repo}
      - GOLD_MASTERS_BUCKET=${GOLD_MASTERS_BUCKET:-gold-masters}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.2}
      - ENABLE_BLUEPRINT_GENERATION=${ENABLE_BLUEPRINT_GENERATION:-true}
      - ENABLE_LLM=${ENABLE_LLM:-true}
      - LOCAL_EXPORT_PATH=${LOCAL_EXPORT_PATH:-/generated}
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-password}
      - CODEGEN_REQUEST_QUEUE=codegen-request-queue
      - CODEGEN_RESULTS_QUEUE=codegen-results-queue
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://admin:password@postgres:5432/interview_db}
      - EXECUTION_SERVICE_URL=http://execution-service:8001
    volumes:
      - ./generated:/generated
    depends_on:
      - backend
      - redis
      - rabbitmq
      - execution-service
      - postgres

  platform-eval:
    build: ./platform-eval
    container_name: platform_eval
    ports:
      - "8002:8002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://admin:password@postgres:5432/interview_db}
      - SESSION_TTL_SECONDS=5400
      - STORE_BACKEND=postgres
      - ENABLE_LLM=${ENABLE_LLM:-true}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - ./platform-eval/blueprint:/blueprint:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-backend:
    build: ./admin-backend
    container_name: interview_admin_backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-interview_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret-in-production}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      ECR_REPOSITORY_URI: ${ECR_REPOSITORY_URI}
      AWS_S3_CHALLENGES_BUCKET: ${AWS_S3_CHALLENGES_BUCKET:-challenges-repo}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  admin-ui:
    build: ./admin-ui
    container_name: interview_admin_ui
    ports:
      - "5174:80"
    depends_on:
      - admin-backend

  ui:
    build: ./platform-ui
    container_name: platform_ui
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Builds the Java executor image with the base Spring Boot dependency tree
  # baked into the local Maven repo via `mvn dependency:go-offline`.
  java-executor-build:
    build:
      context: ./platform-execution_service/executors/java
      dockerfile: Dockerfile
    image: platform/java-executor:latest
    command: echo "Java executor image built"

  # Deferred Eager session-container manager for Run (see
  # docs/design/deferred-eager-final-architecture.md) — owns long-lived, session-pinned
  # containers behind a synchronous HTTP API. Submit/grading will move here too; the
  # previous separate `platform-workers` RabbitMQ-based grading service has been removed.
  execution-service:
    build: ./platform-execution_service
    container_name: platform_execution_service
    ports:
      - "8001:8001"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/sessions:/tmp/sessions
      - ./challenges:/challenges:ro
    depends_on:
      java-executor-build:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
