services:
  minio:
    image: minio/minio
    container_name: interview_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    container_name: interview_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./challenges/book-my-show/dist/node:/seed_data
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/challenges || true;
      /usr/bin/mc mb myminio/gold-masters || true;
      /usr/bin/mc anonymous set download myminio/challenges;
      /usr/bin/mc cp /seed_data/*.zip myminio/challenges/node/ || true;
      exit 0;
      "

  postgres:
    image: postgres:16-alpine
    container_name: interview_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: interview_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d interview_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interview_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: interview_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./platform-backend_service
    container_name: platform_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: password
      EXECUTION_SERVICE_URL: http://execution-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      execution-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  codegen:
    build: ./platform-codegen
    container_name: platform_codegen
    ports:
      - "8000:8000"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
      - EXECUTION_SERVICE_URL=http://execution-service:8001
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - ENABLE_BLUEPRINT_GENERATION=${ENABLE_BLUEPRINT_GENERATION:-true}
      - ENABLE_LLM=${ENABLE_LLM:-true}
      - LOCAL_EXPORT_PATH=/generated
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=admin
      - RABBITMQ_PASSWORD=password
      - CODEGEN_REQUEST_QUEUE=codegen-request-queue
      - CODEGEN_RESULTS_QUEUE=codegen-results-queue
    volumes:
      - ./challenges:/challenges
      - ./generated:/generated
    depends_on:
      - backend
      - minio
      - redis
      - rabbitmq
      - execution-service

  admin-backend:
    build: ./admin-backend
    container_name: interview_admin_backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: password
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy

  admin-ui:
    build: ./admin-ui
    container_name: interview_admin_ui
    ports:
      - "5174:80"
    depends_on:
      - admin-backend

  ui:
    build: ./platform-ui
    container_name: platform_ui
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Builds the Node.js executor image with all challenge deps at /preinstalled_modules.
  # Not yet consumed by anything (execution-service only supports Java so far) — kept
  # ready for when Node support is added there.
  node-deps-init:
    build:
      context: ./platform-execution_service/executors/node
    image: platform/node-executor:latest
    command: echo "Node.js executor image ready"

  # Builds the Python executor image with all challenge deps baked in. Not yet consumed
  # by anything (execution-service only supports Java so far) — kept ready for when
  # Python support is added there.
  python-executor-build:
    build:
      context: ./platform-execution_service/executors/python
    image: platform/python-executor:latest
    command: echo "Python executor image built"

  # Builds the Java executor image with the base Spring Boot dependency tree
  # baked into the local Maven repo via `mvn dependency:go-offline`.
  java-executor-build:
    build:
      context: ./platform-execution_service/executors/java
    image: platform/java-executor:latest
    command: echo "Java executor image built"

  # Deferred Eager session-container manager for Run (see
  # docs/design/deferred-eager-final-architecture.md) — owns long-lived, session-pinned
  # containers behind a synchronous HTTP API. Submit/grading will move here too; the
  # previous separate `platform-workers` RabbitMQ-based grading service has been removed.
  execution-service:
    build: ./platform-execution_service
    container_name: platform_execution_service
    ports:
      - "8001:8001"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/sessions:/tmp/sessions
      - ./challenges:/challenges:ro
    depends_on:
      java-executor-build:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

volumes:
  minio_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
