services:
  minio:
    image: minio/minio
    container_name: interview_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    container_name: interview_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./challenges/book-my-show/dist/node:/seed_data
      - ./generated/dist/challenges:/generated_challenges
      - ./generated/dist/gold-masters:/generated_gm
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/challenges || true;
      /usr/bin/mc anonymous set download myminio/challenges;
      /usr/bin/mc mb myminio/gold-masters || true;
      /usr/bin/mc cp /seed_data/*.zip myminio/challenges/node/ 2>/dev/null || true;
      /usr/bin/mc mirror --overwrite /generated_challenges/ myminio/challenges/ 2>/dev/null || true;
      /usr/bin/mc mirror --overwrite /generated_gm/ myminio/gold-masters/ 2>/dev/null || true;
      exit 0;
      "

  postgres:
    image: postgres:16-alpine
    container_name: interview_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: interview_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d interview_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interview_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: interview_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./platform-backend
    container_name: platform_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  codegen:
    build: ./platform-codegen
    container_name: platform_codegen
    ports:
      - "8000:8000"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
      - MINIO_BUCKET=challenges
      - REDIS_HOST=redis
      - BACKEND_URL=http://backend:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o
      - ENABLE_BLUEPRINT_GENERATION=true
      - ENABLE_LLM=true
      - LOCAL_EXPORT_PATH=/generated
    volumes:
      - ./generated:/generated
    depends_on:
      - backend
      - minio
      - redis

  ui:
    build: ./platform-ui
    container_name: platform_ui
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Builds the Node.js executor image with all challenge deps at /preinstalled_modules.
  # Workers use the image directly — no shared volume seeding needed.
  node-deps-init:
    build:
      context: ./platform-workers/executors/node
    image: platform/node-executor:latest
    command: echo "Node.js executor image ready"

  # Builds the Python executor image with all challenge deps baked in.
  python-executor-build:
    build:
      context: ./platform-workers/executors/python
    image: platform/python-executor:latest
    command: echo "Python executor image built"

  workers:
    build: ./platform-workers
    # container_name omitted to allow: docker compose up --scale workers=N
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASSWORD=password
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=gpt-4o-mini
      - ENABLE_AI_EVALUATION=true
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
      - BACKEND_URL=http://backend:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/grading_stages:/tmp/grading_stages
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      node-deps-init:
        condition: service_completed_successfully
      python-executor-build:
        condition: service_completed_successfully

volumes:
  minio_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  platform_npm_cache:
  platform_maven_cache:
