server:
  port: 8081

spring:
  application:
    name: admin-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: admin_flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 1
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:password}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-256-bit-secret-in-every-environment}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  queues:
    codegen-request: codegen-request-queue
    codegen-results: codegen-results-queue

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
